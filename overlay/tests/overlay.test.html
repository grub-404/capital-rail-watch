<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overlay Unit Tests</title>
<style>
body{font:14px/1.6 monospace;background:#1a1a1a;color:#ddd;margin:20px}
.pass{color:#40c840}.fail{color:#e04444;font-weight:bold}
h2{color:#dcb030;margin-top:24px}
#summary{font-size:18px;margin:16px 0;padding:8px;border:1px solid #444}
</style>
</head>
<body>
<h1>Capital Rail Watch — Overlay Tests</h1>
<div id="summary"></div>
<div id="results"></div>

<script>
// ─── Test infrastructure ───────────────────────────────
let passed = 0, failed = 0;
const results = [];

function assert(condition, msg) {
  if (condition) { passed++; results.push({ok:true, msg}); }
  else { failed++; results.push({ok:false, msg}); }
}
function eq(a, b, msg) { assert(a === b, msg + ` (got ${JSON.stringify(a)}, want ${JSON.stringify(b)})`); }
function deepEq(a, b, msg) { assert(JSON.stringify(a) === JSON.stringify(b), msg + ` (got ${JSON.stringify(a)}, want ${JSON.stringify(b)})`); }

// ─── Functions under test (MUST stay in sync with overlay/index.html) ──

const NORTH_ROUTES = [
  'acela','ne regional','northeast regional','vermonter',
  'capitol limited','lake shore limited','cardinal',
  'carolinian','palmetto','silver star','silver meteor',
  'marc penn','marc - penn'
];

function calcDelay(schISO, actISO) {
  if (!schISO || !actISO) return 0;
  const sch = new Date(schISO).getTime();
  const act = new Date(actISO).getTime();
  if (isNaN(sch) || isNaN(act)) return 0;
  return Math.round((act - sch) / 60000);
}

function parseTrains(apiResp) {
  // apiResp is the Amtraker v3 /v3/trains response:
  // { "trainNum": [{ trainNum, routeName, origCode, destCode, stations: [...], ... }], ... }
  if (!apiResp || typeof apiResp !== 'object' || Array.isArray(apiResp)) return [];
  const out = [];
  for (const key of Object.keys(apiResp)) {
    const arr = apiResp[key];
    if (!Array.isArray(arr)) continue;
    for (const train of arr) {
      if (!train.trainNum) continue;
      const stations = train.stations || [];
      const wasStop = stations.find(s => (s.code || '').toUpperCase() === 'WAS');
      if (!wasStop) continue;

      const origCode = (train.origCode || '').toUpperCase();
      const destCode = (train.destCode || '').toUpperCase();
      const stopStatus = (wasStop.status || '').toLowerCase();

      let direction;
      if (destCode === 'WAS') {
        direction = 'arr';
      } else if (origCode === 'WAS') {
        direction = 'dep';
      } else if (stopStatus === 'enroute' || stopStatus === '') {
        direction = 'arr';
      } else {
        direction = 'dep'; // Departed, Station → already arrived, next is dep
      }

      const schTime = direction === 'arr' ? wasStop.schArr : wasStop.schDep;
      const actTime = direction === 'arr' ? (wasStop.arr || '') : (wasStop.dep || '');
      const delay = calcDelay(
        direction === 'arr' ? wasStop.schArr : wasStop.schDep,
        direction === 'arr' ? wasStop.arr : wasStop.dep
      );

      out.push({
        num: String(train.trainNum),
        route: train.routeName || '',
        direction,
        schTime: schTime || '',
        actTime: actTime,
        delay,
        platform: wasStop.platform || '',
        origin: train.origName || '',
        destination: train.destName || '',
        system: 'amtrak',
        status: stopStatus
      });
    }
  }
  return out;
}

function filterNorthApproach(trains) {
  return trains.filter(t => {
    const r = t.route.toLowerCase();
    return NORTH_ROUTES.some(n => r.includes(n));
  });
}

function statusText(delay) {
  if (delay === 0) return { text: 'ON TIME', cls: 'green' };
  if (delay > 0) return { text: '+' + delay + ' MIN', cls: 'red' };
  return { text: delay + ' MIN', cls: 'green' };
}

function fmtTime(dateStr) {
  if (!dateStr) return '--:--';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '--:--';
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'P' : 'A';
  h = h % 12 || 12;
  return h + ':' + m + ampm;
}

function F(text, len, cls) {
  text = String(text);
  while (text.length < len) text += ' ';
  text = text.substring(0, len);
  let html = '';
  for (let i = 0; i < text.length; i++) {
    const ch = text[i] === ' ' ? '&nbsp;' : text[i].toUpperCase();
    html += '<span class="c' + (cls ? ' ' + cls : '') + '">' + ch + '</span>';
  }
  return html;
}

// ─── Tests ─────────────────────────────────────────────

// calcDelay
(function testCalcDelay() {
  eq(calcDelay('2026-03-21T14:30:00-04:00', '2026-03-21T14:38:00-04:00'), 8, 'calcDelay: 8 min late');
  eq(calcDelay('2026-03-21T14:30:00-04:00', '2026-03-21T14:27:00-04:00'), -3, 'calcDelay: 3 min early');
  eq(calcDelay('2026-03-21T14:30:00-04:00', '2026-03-21T14:30:00-04:00'), 0, 'calcDelay: on time');
  eq(calcDelay('', '2026-03-21T14:30:00-04:00'), 0, 'calcDelay: no schedule → 0');
  eq(calcDelay('2026-03-21T14:30:00-04:00', ''), 0, 'calcDelay: no actual → 0');
  eq(calcDelay(null, null), 0, 'calcDelay: nulls → 0');
})();

// parseTrains — real API shape
(function testParseTrainsTerminating() {
  const api = { '2253': [{ trainNum: '2253', routeName: 'Acela',
    origCode: 'BOS', destCode: 'WAS', origName: 'Boston South', destName: 'Washington Union',
    stations: [
      { code: 'BOS', schArr: '', schDep: '2026-03-21T06:00:00-04:00', status: 'Departed', platform: '' },
      { code: 'NYP', schArr: '2026-03-21T10:00:00-04:00', schDep: '2026-03-21T10:15:00-04:00', arr: '2026-03-21T10:05:00-04:00', dep: '2026-03-21T10:18:00-04:00', status: 'Departed', platform: '7' },
      { code: 'WAS', schArr: '2026-03-21T14:30:00-04:00', schDep: '', arr: '2026-03-21T14:38:00-04:00', dep: '', status: 'Enroute', platform: '' }
    ]
  }]};
  const out = parseTrains(api);
  eq(out.length, 1, 'parseTrains: returns 1 train');
  eq(out[0].num, '2253', 'parseTrains: train number');
  eq(out[0].route, 'Acela', 'parseTrains: route name');
  eq(out[0].direction, 'arr', 'parseTrains: destCode=WAS → arr');
  eq(out[0].delay, 8, 'parseTrains: delay calculated from sch vs actual');
  eq(out[0].origin, 'Boston South', 'parseTrains: origin from train level');
  eq(out[0].schTime, '2026-03-21T14:30:00-04:00', 'parseTrains: schTime = WAS schArr');
})();

(function testParseTrainsOriginating() {
  const api = { '171': [{ trainNum: '171', routeName: 'NE Regional',
    origCode: 'WAS', destCode: 'BOS', origName: 'Washington Union', destName: 'Boston South',
    stations: [
      { code: 'WAS', schArr: '', schDep: '2026-03-21T10:05:00-04:00', arr: '', dep: '2026-03-21T10:05:00-04:00', status: 'Departed', platform: '12' }
    ]
  }]};
  const out = parseTrains(api);
  eq(out[0].direction, 'dep', 'parseTrains: origCode=WAS → dep');
  eq(out[0].schTime, '2026-03-21T10:05:00-04:00', 'parseTrains: schTime = WAS schDep for dep');
  eq(out[0].platform, '12', 'parseTrains: platform from WAS stop');
})();

(function testParseThroughEnroute() {
  const api = { '91': [{ trainNum: '91', routeName: 'Silver Star',
    origCode: 'NYP', destCode: 'MIA', origName: 'New York Penn', destName: 'Miami',
    stations: [
      { code: 'NYP', schDep: '2026-03-21T07:00:00-04:00', status: 'Departed', platform: '' },
      { code: 'WAS', schArr: '2026-03-21T11:00:00-04:00', schDep: '2026-03-21T11:20:00-04:00', arr: '', dep: '', status: 'Enroute', platform: '' },
      { code: 'MIA', schArr: '2026-03-21T23:00:00-04:00', status: 'Enroute', platform: '' }
    ]
  }]};
  const out = parseTrains(api);
  eq(out[0].direction, 'arr', 'parseTrains: through train enroute to WAS → arr');
})();

(function testParseThroughDeparted() {
  const api = { '91': [{ trainNum: '91', routeName: 'Silver Star',
    origCode: 'NYP', destCode: 'MIA', origName: 'New York Penn', destName: 'Miami',
    stations: [
      { code: 'WAS', schArr: '2026-03-21T11:00:00-04:00', schDep: '2026-03-21T11:20:00-04:00',
        arr: '2026-03-21T11:05:00-04:00', dep: '2026-03-21T11:22:00-04:00',
        status: 'Departed', platform: '15' }
    ]
  }]};
  const out = parseTrains(api);
  eq(out[0].direction, 'dep', 'parseTrains: through train departed WAS → dep');
  eq(out[0].platform, '15', 'parseTrains: platform extracted');
})();

(function testParseNoWASStop() {
  const api = { '50': [{ trainNum: '50', routeName: 'Cardinal',
    origCode: 'CHI', destCode: 'NYP', origName: 'Chicago', destName: 'New York',
    stations: [{ code: 'CHI', schDep: '2026-03-21T06:00:00-04:00', status: 'Departed', platform: '' }]
  }]};
  eq(parseTrains(api).length, 0, 'parseTrains: train with no WAS stop → excluded');
})();

(function testParseEmpty() {
  deepEq(parseTrains(null), [], 'parseTrains: null → []');
  deepEq(parseTrains('bad'), [], 'parseTrains: string → []');
  deepEq(parseTrains({}), [], 'parseTrains: empty obj → []');
  deepEq(parseTrains([]), [], 'parseTrains: array → []');
})();

// filterNorthApproach
(function testFilterNorth() {
  const trains = [
    { num: '2253', route: 'Acela', direction: 'arr' },
    { num: '171', route: 'NE Regional', direction: 'dep' },
    { num: '91', route: 'Silver Star', direction: 'arr' },
    { num: '79', route: 'Carolinian', direction: 'arr' },
    { num: '19', route: 'Crescent', direction: 'arr' },       // NOT north
    { num: '29', route: 'Capitol Limited', direction: 'arr' },
  ];
  const out = filterNorthApproach(trains);
  eq(out.length, 5, 'filterNorthApproach: 5 of 6 are north corridor');
  assert(!out.find(t => t.route === 'Crescent'), 'filterNorthApproach: Crescent excluded');
})();

(function testFilterNorthMARC() {
  const trains = [{ num: '432', route: 'MARC Penn', direction: 'arr' }];
  eq(filterNorthApproach(trains).length, 1, 'filterNorthApproach: MARC Penn included');
})();

// statusText
(function testStatusText() {
  deepEq(statusText(0), { text: 'ON TIME', cls: 'green' }, 'statusText: 0 delay → ON TIME');
  deepEq(statusText(8), { text: '+8 MIN', cls: 'red' }, 'statusText: +8 late');
  deepEq(statusText(-3), { text: '-3 MIN', cls: 'green' }, 'statusText: -3 early');
  deepEq(statusText(42), { text: '+42 MIN', cls: 'red' }, 'statusText: +42 very late');
})();

// fmtTime
(function testFmtTime() {
  eq(fmtTime('2026-03-21T14:30:00'), '2:30P', 'fmtTime: 2:30 PM');
  eq(fmtTime('2026-03-21T09:05:00'), '9:05A', 'fmtTime: 9:05 AM');
  eq(fmtTime('2026-03-21T00:00:00'), '12:00A', 'fmtTime: midnight');
  eq(fmtTime('2026-03-21T12:00:00'), '12:00P', 'fmtTime: noon');
  eq(fmtTime('2026-03-21T14:30:00-04:00'), '2:30P', 'fmtTime: with tz offset');
  eq(fmtTime(''), '--:--', 'fmtTime: empty string');
  eq(fmtTime(null), '--:--', 'fmtTime: null');
})();

// F (flap cell generator)
(function testF() {
  const html = F('AB', 3, 'red');
  assert(html.includes('class="c red"'), 'F: applies color class');
  assert(html.includes('>A<'), 'F: first char uppercase');
  assert(html.includes('>B<'), 'F: second char');
  assert(html.includes('&nbsp;'), 'F: pads with nbsp');
  eq(F('ABCDEF', 3, '').split('</span>').length - 1, 3, 'F: truncates to len');
})();

// ─── Render results ────────────────────────────────────
const el = document.getElementById('results');
const sum = document.getElementById('summary');
let html = '';
let section = '';
results.forEach(r => {
  const name = r.msg.split(':')[0];
  if (name !== section) { section = name; html += '<h2>' + section + '</h2>'; }
  html += '<div class="' + (r.ok ? 'pass' : 'fail') + '">' +
    (r.ok ? '✓' : '✗') + ' ' + r.msg + '</div>';
});
el.innerHTML = html;
sum.innerHTML = '<span class="pass">' + passed + ' passed</span> · ' +
  (failed ? '<span class="fail">' + failed + ' failed</span>' : '<span class="pass">0 failed</span>');
sum.style.borderColor = failed ? '#e04444' : '#40c840';
</script>
</body>
</html>
